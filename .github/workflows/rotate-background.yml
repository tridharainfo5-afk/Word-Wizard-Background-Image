name: Rotate Daily Background

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rotate background
        run: |
          YESTERDAY=$(TZ='Asia/Kolkata' date -d 'yesterday' +'%-d-%B')
          TODAY=$(TZ='Asia/Kolkata' date +'%-d-%B')
          echo "Restoring: background.jpg → ${YESTERDAY}.jpg"
          cp background.jpg "${YESTERDAY}.jpg"
          echo "New background: ${TODAY}.jpg"
          cp "${TODAY}.jpg" background.jpg

      - name: Commit & Push
        run: |
          YESTERDAY=$(TZ='Asia/Kolkata' date -d 'yesterday' +'%-d-%B')
          TODAY=$(TZ='Asia/Kolkata' date +'%-d-%B')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Background: ${TODAY}.jpg" || echo "No change"
          git push
